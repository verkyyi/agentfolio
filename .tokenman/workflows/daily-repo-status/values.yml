recipe: daily-repo-status
recipe_version: 1.0.0

schedule: "0 9 * * *"
title_prefix: "[repo-status]"
labels:
  - report
  - tokenman
history_window_hours: 24
skip_on_quiet_day: false
model: sonnet
report_sections:
  - commits
  - pull_requests
  - issues
  - ci
  - releases

notes:
  schedule: Default 9am UTC accepted. Repo owner commits from PDT (-0700), so daily reports land at 2am local — adjust here and regenerate the workflow if that's inconvenient.
  title_prefix: Default. Changing this breaks the close-older-issues matcher unless the workflow file is regenerated in lockstep.
  labels: Default. The `tokenman` label is required — the apply job uses it as the dual-marker check alongside the title prefix.
  history_window_hours: Default 24 matches the daily cadence.
  skip_on_quiet_day: Default false — always post so the user can tell the workflow is alive.
  model: Default sonnet — sufficient for summarization, ~$0.02/run.
  report_sections: Default full set. Claude omits empty sections cleanly.
