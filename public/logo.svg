<svg width="170" height="120" viewBox="0 0 170 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8926A" />
      <stop offset="100%" stop-color="#C45E35" />
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0B89A" />
      <stop offset="100%" stop-color="#E8926A" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Pac-man body -->
  <path
    d="M 60 60 L 97.35 33.84 A 45.6 45.6 0 1 1 97.35 86.16 Z"
    fill="url(#bodyGrad)"
    filter="url(#glow)"
  />

  <!-- Eye -->
  <circle cx="66.84" cy="40.85" r="4.8" fill="white" opacity="0.9" />

  <!-- Token dots -->
  <rect x="111.9" y="56.1" width="7.8" height="7.8" rx="1.56" fill="url(#dotGrad)" opacity="1" />
  <rect x="125.97" y="56.37" width="7.25" height="7.25" rx="1.45" fill="url(#dotGrad)" opacity="0.82" />
  <rect x="140.05" y="56.65" width="6.71" height="6.71" rx="1.34" fill="url(#dotGrad)" opacity="0.64" />
  <rect x="154.12" y="56.92" width="6.16" height="6.16" rx="1.23" fill="url(#dotGrad)" opacity="0.46" />
</svg>
