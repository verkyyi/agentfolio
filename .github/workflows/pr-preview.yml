name: PR Preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - 'data/**'
      - '.github/workflows/pr-preview.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest
    env:
      PREVIEW_ID: ${{ github.event.pull_request.number || github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Run web tests
        working-directory: web
        run: npm test

      - name: Build portable preview
        working-directory: web
        env:
          VITE_BASE_PATH: ./
          VITE_CHAT_PROXY_URL: ${{ vars.VITE_CHAT_PROXY_URL }}
        run: npm run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentfolio-preview-${{ env.PREVIEW_ID }}
          path: web/dist
          if-no-files-found: error
          retention-days: 7
