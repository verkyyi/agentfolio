# Generated by tokenman from .tokenman/workflows/daily-repo-status/values.yml
# Do not edit this file directly. Run: claude "tune daily-repo-status" to change parameters.
# Recipe: daily-repo-status v1.0.0

name: tokenman / daily-repo-status

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: tokenman-daily-repo-status
  cancel-in-progress: false

permissions: {}

jobs:
  analyze:
    name: Gather activity and draft report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: read
      pull-requests: read
      actions: read
      id-token: write
    outputs:
      has_activity: ${{ steps.validate.outputs.has_activity }}
    steps:
      - name: Checkout (for CLAUDE.md context)
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Gather repo activity
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          since=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          today=$(date -u +%Y-%m-%d)
          mkdir -p /tmp/tokenman

          gh api "repos/$REPO/commits?since=$since" --paginate \
            --jq '[.[] | {sha: .sha[0:7], message: (.commit.message | split("\n") | .[0]), author: (.commit.author.name), url: .html_url, date: .commit.author.date}]' \
            > /tmp/tokenman/commits.json 2>/dev/null || echo '[]' > /tmp/tokenman/commits.json

          gh pr list --state all --limit 30 \
            --json number,title,state,author,createdAt,updatedAt,mergedAt,closedAt,url,labels \
            | jq --arg since "$since" '[.[] | select(.updatedAt >= $since)]' \
            > /tmp/tokenman/prs.json

          gh issue list --state all --limit 30 \
            --json number,title,state,author,createdAt,updatedAt,closedAt,url,labels \
            | jq --arg since "$since" '[.[] | select(.updatedAt >= $since)]' \
            > /tmp/tokenman/issues.json

          gh run list --limit 20 \
            --json name,status,conclusion,createdAt,url,headBranch,event \
            | jq --arg since "$since" '[.[] | select(.createdAt >= $since)]' \
            > /tmp/tokenman/runs.json

          gh release list --limit 5 \
            --json tagName,publishedAt,name \
            | jq --arg since "$since" '[.[] | select(.publishedAt >= $since)]' \
            > /tmp/tokenman/releases.json

          jq -n \
            --slurpfile commits /tmp/tokenman/commits.json \
            --slurpfile prs /tmp/tokenman/prs.json \
            --slurpfile issues /tmp/tokenman/issues.json \
            --slurpfile runs /tmp/tokenman/runs.json \
            --slurpfile releases /tmp/tokenman/releases.json \
            --arg since "$since" \
            --arg today "$today" \
            --arg repo "$REPO" \
            '{since: $since, today: $today, repo: $repo,
              commits: $commits[0], pull_requests: $prs[0],
              issues: $issues[0], ci_runs: $runs[0], releases: $releases[0]}' \
            > /tmp/tokenman/activity.json

          echo "### Activity snapshot" >> "$GITHUB_STEP_SUMMARY"
          printf -- '- commits: %s\n- prs: %s\n- issues: %s\n- ci_runs: %s\n- releases: %s\n' \
            "$(jq 'length' /tmp/tokenman/commits.json)" \
            "$(jq 'length' /tmp/tokenman/prs.json)" \
            "$(jq 'length' /tmp/tokenman/issues.json)" \
            "$(jq 'length' /tmp/tokenman/runs.json)" \
            "$(jq 'length' /tmp/tokenman/releases.json)" >> "$GITHUB_STEP_SUMMARY"

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the daily status-report agent for this repository (agentfolio — an open-source agentic portfolio engine).

            The activity data has already been gathered. Read /tmp/tokenman/activity.json. It has this shape:
            {
              "since": "ISO timestamp (24h ago)",
              "today": "YYYY-MM-DD (UTC today)",
              "repo": "owner/name",
              "commits": [...],
              "pull_requests": [...],
              "issues": [...],
              "ci_runs": [...],
              "releases": [...]
            }

            Compose a concise, friendly-neutral markdown report and write it to /tmp/tokenman-report.json using this exact schema:
            {
              "version": 1,
              "type": "create_status_report_issue",
              "payload": {
                "title": "[repo-status] <today>",
                "body": "... markdown report ...",
                "labels": ["report", "tokenman"],
                "has_activity": <true|false>
              }
            }

            Body structure:
            - Opening line: one-sentence summary (e.g., "Active day: 3 commits, 2 PRs opened, 1 merged.")
            - "## Commits" section (omit if none): bullet list of up to 10, with short SHA and link
            - "## Pull requests" section (omit if none): opened / merged / closed subsections
            - "## Issues" section (omit if none): opened / closed subsections
            - "## CI" section (omit if all green): failed runs with links
            - "## Releases" section (omit if none): new releases
            - Closing line: brief observation or nothing-to-flag note

            Constraints:
            - Keep body under ~500 words
            - Title: "[repo-status] " + the `today` value from activity.json
            - Set has_activity=false ONLY if commits, pull_requests, issues, ci_runs, and releases are ALL empty
            - On a fully quiet day (has_activity=false) still post a short body: "Quiet day — no commits, PRs, or issues in the last 24 hours."
            - Do NOT call gh, git, or any network tools. All data is in the JSON file. Only Read and Write are available.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 5
            --allowedTools "Read,Write(/tmp/tokenman-report.json)"

      - name: Validate Claude's output
        id: validate
        run: |
          set -euo pipefail
          if [ ! -f /tmp/tokenman-report.json ]; then
            echo "Claude did not produce a report."
            exit 1
          fi
          jq -e '
            .version == 1 and
            .type == "create_status_report_issue" and
            (.payload.title | type == "string" and length > 0 and length < 200) and
            (.payload.body | type == "string" and length > 0 and length < 60000) and
            (.payload.labels | type == "array" and any(. == "tokenman"))
          ' /tmp/tokenman-report.json > /dev/null
          has_activity=$(jq -r '.payload.has_activity // true' /tmp/tokenman-report.json)
          echo "has_activity=$has_activity" >> "$GITHUB_OUTPUT"
          {
            echo "### Draft report preview"
            echo ""
            jq -r '.payload.title' /tmp/tokenman-report.json | sed 's/^/**Title:** /'
            echo ""
            echo "**Body (truncated):**"
            echo ""
            jq -r '.payload.body' /tmp/tokenman-report.json | head -c 500
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokenman-report
          path: /tmp/tokenman-report.json
          retention-days: 7

  apply:
    name: Publish report issue
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: tokenman-report
          path: /tmp

      - name: Re-validate report (defense in depth)
        run: |
          set -euo pipefail
          jq -e '
            .version == 1 and
            .type == "create_status_report_issue" and
            (.payload.title | startswith("[repo-status]")) and
            (.payload.labels | any(. == "tokenman"))
          ' /tmp/tokenman-report.json > /dev/null

      - name: Close older report issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Dual-marker check: title prefix AND tokenman label. Protects hand-authored issues.
          old_issues=$(gh issue list \
            --state open \
            --label tokenman \
            --search '"[repo-status]" in:title' \
            --json number,title,labels \
            --limit 30 \
            --jq '.[] | select(.title | startswith("[repo-status]")) | select(.labels | map(.name) | index("tokenman")) | .number')

          if [ -z "$old_issues" ]; then
            echo "No prior report issues to close."
            exit 0
          fi

          for num in $old_issues; do
            echo "Closing prior report #$num"
            gh issue comment "$num" --body "Superseded by the new daily report."
            gh issue close "$num" --reason completed
          done

      - name: Create new status-report issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          title=$(jq -r '.payload.title' /tmp/tokenman-report.json)
          labels=$(jq -r '.payload.labels | join(",")' /tmp/tokenman-report.json)
          jq -r '.payload.body' /tmp/tokenman-report.json > /tmp/tokenman-body.md

          url=$(gh issue create \
            --repo "$REPO" \
            --title "$title" \
            --body-file /tmp/tokenman-body.md \
            --label "$labels")

          echo "Created $url"
          echo "[$title]($url)" >> "$GITHUB_STEP_SUMMARY"
