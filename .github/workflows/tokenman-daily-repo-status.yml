# Generated by tokenman from .tokenman/workflows/daily-repo-status/values.yml
# Do not edit this file directly. Run: claude "tune daily-repo-status" to change parameters.
# Recipe: daily-repo-status v1.0.0

name: tokenman / daily-repo-status

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: tokenman-daily-repo-status
  cancel-in-progress: false

permissions: {}

jobs:
  analyze:
    name: Gather activity and draft report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: read
      pull-requests: read
      actions: read
    outputs:
      has_activity: ${{ steps.validate.outputs.has_activity }}
    steps:
      - name: Checkout (for CLAUDE.md context)
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the daily status-report agent for this repository (agentfolio — an open-source agentic portfolio engine).

            Configuration:
            - history_window_hours: 24
            - report_sections: [commits, pull_requests, issues, ci, releases]
            - skip_on_quiet_day: false

            Process:
            1. Gather activity from the last 24 hours using:
               - `gh api "repos/${{ github.repository }}/commits?since=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)" --paginate` for commits
               - `gh pr list --state all --limit 30 --json number,title,state,author,updatedAt,url,labels` then filter to last 24h
               - `gh issue list --state all --limit 30 --json number,title,state,author,updatedAt,url,labels` then filter to last 24h
               - `gh run list --limit 20 --json name,status,conclusion,createdAt,url` for CI runs
               - `gh release list --limit 5 --json tagName,publishedAt,name` for releases
            2. Compose a concise, scannable status report as markdown. Structure:
               - Opening line: one-sentence summary (e.g., "Active day: 3 commits, 2 PRs opened, 1 merged.")
               - "## Commits" section (omit if none): bullet list of up to 10 recent commits with links
               - "## Pull requests" section (omit if none): opened / merged / closed subsections
               - "## Issues" section (omit if none): opened / closed subsections
               - "## CI" section (omit if all green): any failed runs with links
               - "## Releases" section (omit if none): any new releases
               - Closing line: brief observation or nothing-to-flag note
            3. Keep it under ~500 words. Link to issues/PRs with their numbers. Use a friendly-neutral tone (no CONTRIBUTING.md in this repo).
            4. Write the output to /tmp/tokenman-report.json with this exact schema:
               {
                 "version": 1,
                 "type": "create_status_report_issue",
                 "payload": {
                   "title": "[repo-status] YYYY-MM-DD",
                   "body": "... markdown report ...",
                   "labels": ["report", "tokenman"],
                   "has_activity": true
                 }
               }
               Set has_activity to false ONLY if truly zero activity in all sections.
               When there is no activity, still produce a short body like "Quiet day — no commits, PRs, or issues in the last 24 hours." (skip_on_quiet_day is false, so we still post.)
            5. Do not create, modify, comment on, or close any GitHub resource yourself. The apply job will execute.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 10
            --allowedTools "Bash(gh api:*),Bash(gh pr list:*),Bash(gh issue list:*),Bash(gh run list:*),Bash(gh release list:*),Bash(date:*),Read,Write(/tmp/tokenman-report.json)"

      - name: Validate Claude's output
        id: validate
        run: |
          set -euo pipefail
          if [ ! -f /tmp/tokenman-report.json ]; then
            echo "Claude did not produce a report."
            exit 1
          fi
          jq -e '
            .version == 1 and
            .type == "create_status_report_issue" and
            (.payload.title | type == "string" and length > 0 and length < 200) and
            (.payload.body | type == "string" and length > 0 and length < 60000) and
            (.payload.labels | type == "array" and any(. == "tokenman"))
          ' /tmp/tokenman-report.json > /dev/null
          has_activity=$(jq -r '.payload.has_activity // true' /tmp/tokenman-report.json)
          echo "has_activity=$has_activity" >> "$GITHUB_OUTPUT"
          {
            echo "### Draft report preview"
            echo ""
            jq -r '.payload.title' /tmp/tokenman-report.json | sed 's/^/**Title:** /'
            echo ""
            echo "**Body (truncated):**"
            echo ""
            jq -r '.payload.body' /tmp/tokenman-report.json | head -c 500
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokenman-report
          path: /tmp/tokenman-report.json
          retention-days: 7

  apply:
    name: Publish report issue
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: tokenman-report
          path: /tmp

      - name: Re-validate report (defense in depth)
        run: |
          set -euo pipefail
          jq -e '
            .version == 1 and
            .type == "create_status_report_issue" and
            (.payload.title | startswith("[repo-status]")) and
            (.payload.labels | any(. == "tokenman"))
          ' /tmp/tokenman-report.json > /dev/null

      - name: Close older report issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Find open issues with BOTH the tokenman label AND title starting with [repo-status].
          # The dual-marker check protects hand-authored issues that coincidentally share the prefix.
          old_issues=$(gh issue list \
            --state open \
            --label tokenman \
            --search '"[repo-status]" in:title' \
            --json number,title,labels \
            --limit 30 \
            --jq '.[] | select(.title | startswith("[repo-status]")) | select(.labels | map(.name) | index("tokenman")) | .number')

          if [ -z "$old_issues" ]; then
            echo "No prior report issues to close."
            exit 0
          fi

          for num in $old_issues; do
            echo "Closing prior report #$num"
            gh issue comment "$num" --body "Superseded by the new daily report."
            gh issue close "$num" --reason completed
          done

      - name: Create new status-report issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          title=$(jq -r '.payload.title' /tmp/tokenman-report.json)
          labels=$(jq -r '.payload.labels | join(",")' /tmp/tokenman-report.json)
          jq -r '.payload.body' /tmp/tokenman-report.json > /tmp/tokenman-body.md

          url=$(gh issue create \
            --repo "$REPO" \
            --title "$title" \
            --body-file /tmp/tokenman-body.md \
            --label "$labels")

          echo "Created $url"
          echo "[$title]($url)" >> "$GITHUB_STEP_SUMMARY"
