name: Test PDF Themes

on:
  workflow_dispatch:

jobs:
  test-themes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools and themes
        run: npm install -g resumed puppeteer jsonresume-theme-even jsonresume-theme-onepage jsonresume-theme-class jsonresume-theme-paper

      - name: Generate PDFs with each theme
        run: |
          mkdir -p pdf-samples
          for theme in even onepage class paper; do
            echo "Generating with jsonresume-theme-${theme}..."
            resumed export data/adapted/default.json -t "jsonresume-theme-${theme}" -o "pdf-samples/default-${theme}.pdf" --puppeteer-arg=--no-sandbox || echo "FAILED: ${theme}"
          done
          ls -la pdf-samples/

      - name: Upload PDF samples
        uses: actions/upload-artifact@v4
        with:
          name: pdf-theme-samples
          path: pdf-samples/
          retention-days: 7
