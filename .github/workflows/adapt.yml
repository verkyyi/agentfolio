name: Adapt Resumes
on:
  push:
    branches: [main]
    paths:
      - 'data/input/resume.md'
      - 'data/input/jd/**'
      - '.claude/skills/adapt.md'
  workflow_dispatch:
    inputs:
      slugs:
        description: 'Space-separated slugs to adapt (e.g. "notion stripe"). Leave empty to adapt all.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  adapt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect changed files
        id: changes
        run: |
          # For workflow_dispatch or changes to resume.md/adapt.md, adapt all
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.slugs }}"
            echo "slugs=${INPUT:-all}" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            if echo "$CHANGED" | grep -qE '(data/input/resume\.md|\.claude/skills/adapt\.md)'; then
              echo "slugs=all" >> "$GITHUB_OUTPUT"
            else
              SLUGS=$(echo "$CHANGED" | grep '^data/input/jd/' | sed 's|data/input/jd/||;s|\.md$||' | tr '\n' ' ' | xargs)
              echo "slugs=${SLUGS:-all}" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "Adapt targets: $(cat "$GITHUB_OUTPUT")"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate adaptations
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          SLUGS="${{ steps.changes.outputs.slugs }}"
          if [ "$SLUGS" = "all" ]; then
            claude -p "Use the /adapt skill to regenerate all adapted resumes." --allowedTools Read,Write,Glob 2>&1 | tee adapt-output.log
          else
            claude -p "Use the /adapt skill to regenerate these specific slugs: $SLUGS" --allowedTools Read,Write,Glob 2>&1 | tee adapt-output.log
          fi

      - name: Upload Claude output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adapt-log
          path: adapt-output.log
          retention-days: 7

      - name: Show adapted file changes
        run: git diff -- data/adapted/

      - name: Commit generated files
        run: |
          git config user.name "AgentFolio Bot"
          git config user.email "bot@agentfolio.local"
          git add data/adapted/
          if git diff --cached --quiet; then
            echo "no adaptation changes"
          else
            git commit -m "chore(adapt): regenerate adapted resumes"
            git push
          fi
