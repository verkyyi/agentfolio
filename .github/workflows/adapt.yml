name: Adapt Resumes
on:
  push:
    branches: [main]
    paths:
      - 'data/input/resume.md'
      - 'data/input/jd/**'
      - '.claude/skills/adapt.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  adapt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate adaptations
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: claude -p "Use the /adapt skill to regenerate all adapted resumes." --allowedTools Read,Write,Glob 2>&1 | tee adapt-output.log

      - name: Upload Claude output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adapt-log
          path: adapt-output.log
          retention-days: 7

      - name: Commit generated files
        run: |
          git config user.name "AgentFolio Bot"
          git config user.email "bot@agentfolio.local"
          git add data/adapted/
          if git diff --cached --quiet; then
            echo "no adaptation changes"
          else
            git commit -m "chore(adapt): regenerate adapted resumes"
            git push
          fi
